server {
    listen 80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (CSP servie ici, pas en <meta>, pour ne pas figer le
    # bridge Capacitor : le même build statique sert aussi de WebView native).
    # Le script anti-FOUC inline d'index.html est autorisé par son hash SHA-256
    # (pas de 'unsafe-inline'). Si ce script change, recalculer le hash.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-YJ0pMS3IDqEOgKh+znG6JtIiGmwRrEEGMZBjD7K1w+I='; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' blob: data:; worker-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;

    # Assets Vite (noms hashés) : cache long immuable.
    # Note nginx : un location avec son propre add_header n'hérite PAS de ceux
    # du niveau server, on répète donc les headers de sécurité ici.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-YJ0pMS3IDqEOgKh+znG6JtIiGmwRrEEGMZBjD7K1w+I='; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' blob: data:; worker-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
    }

    # Service worker : jamais mis en cache (doit rester frais).
    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-YJ0pMS3IDqEOgKh+znG6JtIiGmwRrEEGMZBjD7K1w+I='; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' blob: data:; worker-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
    }

    # Endpoint OTA (live updates Capgo) : bundles web chiffrés + manifest,
    # servis depuis un volume dédié monté hors NAS (cf. docker-compose.yml).
    # Sert UNIQUEMENT ce dossier ; le NAS n'est jamais monté dans ce conteneur.
    # Le manifest doit rester frais (détection rapide des MAJ), les bundles
    # versionnés sont immuables (cache CDN long via Cloudflare).
    # Le plugin Capgo interroge le manifest en POST (infos device dans le
    # corps). nginx statique renverrait 405 sur POST : on le convertit en
    # service du fichier (re-entrée interne en GET via error_page). On utilise
    # `root` (et non `alias`) pour que cette re-entrée résolve correctement.
    location = /ota/updates.json {
        root /usr/share/nginx;
        default_type application/json;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        error_page 405 =200 /ota/updates.json;
    }
    # Bundles versionnés : téléchargés en GET, immuables (cache CDN long).
    location /ota/ {
        root /usr/share/nginx;
        limit_except GET HEAD { deny all; }
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # SPA : toute route inconnue retombe sur index.html (routage client HashRouter).
    location / {
        try_files $uri /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;
}
